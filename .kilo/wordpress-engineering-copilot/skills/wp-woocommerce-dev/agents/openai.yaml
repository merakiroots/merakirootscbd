interface:
  display_name: WordPress Woocommerce Development
  short_description: WooCommerce extension code review for HPOS compatibility, payment gateway
    security, cart optimization, and template overrides. Use when reviewing WooCommerce extension
    code, payment gateway development, shipping methods, custom product types, cart operations,
    checkout customization, or when user mentions "WooCommerce review", "WooCommerce extension",
    "WooCommerce plugin", "payment gateway", "shipping method", "HPOS", "High-Performance
    Order Storage", "wc_get_orders", "WC_Payment_Gateway", "WC_Shipping_Method", "cart fragments",
    "WooCommerce hooks", "WooCommerce template", "shop_order", "WooCommerce performance",
    "Action Scheduler", "WooCommerce REST API", "WooCommerce Blocks", "checkout block", "woocommerce_checkout".
    Detects HPOS issues, CRUD violations, payment security anti-patterns, performance problems,
    and template override mistakes in WooCommerce 8.2+ through 10.x code.
  icon_small: assets/icon.svg
  icon_large: assets/icon.svg
policy:
  products:
  - chatgpt
  - codex
  - api
  - atlas
  allow_implicit_invocation: true
