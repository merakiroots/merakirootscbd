interface:
  display_name: WordPress Theme Development
  short_description: WordPress theme code review and block theme development patterns for
    WordPress 6.6+. Use when reviewing theme code, auditing theme.json schema, checking template
    hierarchy, validating block templates, analyzing global styles, verifying style variations,
    reviewing template parts, detecting hardcoded styles, checking classic-to-block migration,
    or when user mentions "theme review", "theme development", "theme.json", "block theme",
    "FSE", "Full Site Editing", "template parts", "template hierarchy", "global styles", "style
    variations", "classic theme", "child theme", "theme patterns", "theme.json validation",
    "hardcoded styles", "useRootPaddingAwareAlignments", "classic-to-block", "hybrid theme",
    "WordPress.org theme". Detects issues in theme.json structure, block templates, template
    parts, style systems, and classic theme migration patterns.
  icon_small: assets/icon.svg
  icon_large: assets/icon.svg
policy:
  products:
  - chatgpt
  - codex
  - api
  - atlas
  allow_implicit_invocation: true
