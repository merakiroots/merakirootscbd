interface:
  display_name: WordPress Plugin Development
  short_description: WordPress plugin architecture review and WordPress.org submission standards.
    Use when reviewing WordPress plugin code, auditing plugin architecture, preparing WordPress.org
    plugin submission, checking plugin best practices, analyzing custom post types, taxonomies,
    Settings API, hooks system, internationalization, or when user mentions "plugin review",
    "plugin development", "plugin best practices", "WordPress.org submission", "Plugin Check",
    "plugin headers", "activation hook", "deactivation hook", "uninstall", "custom post type",
    "taxonomy", "Settings API", "hooks", "actions", "filters", "i18n", "text domain", "prefixing",
    "namespacing". Detects issues in plugin architecture, lifecycle hooks, WordPress.org compliance,
    and API integration.
  icon_small: assets/icon.svg
  icon_large: assets/icon.svg
