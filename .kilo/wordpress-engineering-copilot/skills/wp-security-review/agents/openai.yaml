interface:
  display_name: WordPress Security Review
  short_description: WordPress security code review and vulnerability detection. Use when
    reviewing WordPress PHP code for security issues, auditing themes/plugins for vulnerabilities,
    checking code before launch, analyzing AJAX/REST handlers for exploits, detecting XSS,
    SQL injection, CSRF, or authorization bypass, or when user mentions "security review",
    "vulnerability", "XSS", "SQL injection", "CSRF", "nonce", "sanitization", "escaping",
    "capability check", "privilege escalation", "file upload security", "insecure code", "auth
    bypass", or "security audit". Detects vulnerabilities in input handling, output escaping,
    authorization, nonces, database queries, file uploads, and dangerous functions.
  icon_small: assets/icon.svg
  icon_large: assets/icon.svg
policy:
  products:
  - chatgpt
  - codex
  - api
  - atlas
  allow_implicit_invocation: true
