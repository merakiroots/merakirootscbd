name: ${PROJECT_NAME}

services:
    db:
        image: mariadb:11.4
        container_name: ${PROJECT_NAME}-db
        restart: unless-stopped
        ports:
            - "${MYSQL_PORT}:3306"
        environment:
            MYSQL_DATABASE: ${MYSQL_DATABASE}
            MYSQL_USER: ${MYSQL_USER}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
        volumes:
            - db_data:/var/lib/mysql
        command:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
        networks:
            - wpnet

    composer:
        build:
            context: ./docker
            dockerfile: Dockerfile
        container_name: ${PROJECT_NAME}-composer
        working_dir: /var/www/html/wp-content/plugins/meraki-commerce-core
        environment:
            COMPOSER_ALLOW_SUPERUSER: "1"
            COMPOSER_HOME: /tmp/composer
        volumes:
            - wp_core:/var/www/html
            - ./wp-content/plugins:/var/www/html/wp-content/plugins
            - ./wp-content/themes:/var/www/html/wp-content/themes
            - ./wp-content/uploads:/var/www/html/wp-content/uploads
            - composer_cache:/tmp/composer
        networks:
            - wpnet
        entrypoint: composer

    wordpress:
        build:
            context: ./docker
            dockerfile: Dockerfile
        container_name: ${PROJECT_NAME}-wordpress
        restart: unless-stopped
        depends_on:
            - db
        ports:
            - "${WORDPRESS_PORT}:80"
        environment:
            WORDPRESS_DB_HOST: db:3306
            WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
            WORDPRESS_DB_USER: ${MYSQL_USER}
            WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}

            COMPOSER_ALLOW_SUPERUSER: "1"
            COMPOSER_HOME: /tmp/composer
            COMPOSER_ROOT_VERSION: "0.1.0"

            WORDPRESS_CONFIG_EXTRA: |
                define( 'WP_DEBUG', true );
                define( 'WP_DEBUG_LOG', '/var/www/html/wp-content/debug-logs/debug.log' );
                define( 'WP_DEBUG_DISPLAY', false );
                define( 'SCRIPT_DEBUG', true );
                define( 'SAVEQUERIES', true );
                define( 'WP_ENVIRONMENT_TYPE', 'local' );
                define( 'DISALLOW_FILE_EDIT', true );
        volumes:
            - wp_core:/var/www/html
            - ./wp-content/plugins:/var/www/html/wp-content/plugins
            - ./wp-content/themes:/var/www/html/wp-content/themes
            - ./wp-content/uploads:/var/www/html/wp-content/uploads
            - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins
            - ./logs:/var/www/html/wp-content/debug-logs
            - ./scripts:/var/www/html/scripts:ro
            - ./scripts:/scripts:ro
            - composer_cache:/tmp/composer
        networks:
            - wpnet

    wpcli:
        image: wordpress:cli
        container_name: ${PROJECT_NAME}-wpcli
        depends_on:
            - db
            - wordpress
        environment:
            WORDPRESS_DB_HOST: db:3306
            WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
            WORDPRESS_DB_USER: ${MYSQL_USER}
            WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
            COMPOSER_ROOT_VERSION: "0.1.0"
        volumes:
            - wp_core:/var/www/html
            - ./wp-content/plugins:/var/www/html/wp-content/plugins
            - ./wp-content/themes:/var/www/html/wp-content/themes
            - ./wp-content/uploads:/var/www/html/wp-content/uploads
            - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins
            - ./logs:/var/www/html/wp-content/debug-logs
            - ./scripts:/var/www/html/scripts:ro
            - ./scripts:/scripts:ro
        working_dir: /var/www/html
        networks:
            - wpnet
        entrypoint: wp

    phpmyadmin:
        image: phpmyadmin:latest
        container_name: ${PROJECT_NAME}-phpmyadmin
        restart: unless-stopped
        depends_on:
            - db
        ports:
            - "${PHPMYADMIN_PORT}:81"
        environment:
            PMA_HOST: db
            PMA_PORT: 3306
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            UPLOAD_LIMIT: 256M
        networks:
            - wpnet

    mailhog:
        image: mailhog/mailhog:latest
        container_name: ${PROJECT_NAME}-mailhog
        restart: unless-stopped
        ports:
            - "${MAILHOG_UI_PORT}:8025"
        networks:
            - wpnet

volumes:
    db_data:
    wp_core:
    composer_cache:

networks:
    wpnet:
        driver: bridge
